# Auto-slopp Configuration File
# This file contains the configuration settings for the Auto-slopp automation system

# Duration between cycles in seconds (sleep duration)
sleep_duration: 100

# Path where all repositories are located
# Each subdirectory in this path is treated as a git repository
managed_repo_path: '~/git/managed'

# Separate repository path for task descriptions 
# Used by planner.sh script for storing and processing task files
managed_repo_task_path: '~/git/repo_task_path'

# Logging configuration
log_directory: '~/git/Auto-logs'
log_max_size_mb: 10        # Maximum log file size before rotation (MB)
log_max_files: 5           # Maximum number of rotated log files to keep
log_retention_days: 30     # Maximum age of log files before cleanup (days)
log_level: INFO           # Default log level (DEBUG, INFO, WARNING, ERROR, SUCCESS)

# Enhanced timestamp configuration
timestamp_format: default  # Timestamp format: "default", "iso8601", "compact", "readable", "debug", "microseconds"
timestamp_timezone: local   # Timezone for timestamps: "local" or "utc"

# Auto-update-reboot configuration with enhanced safety mechanisms
auto_update_reboot_enabled: false        # Enable/disable the auto-update-reboot functionality
reboot_cooldown_minutes: 60             # Minimum time between reboots
change_detection_interval_minutes: 5   # How often to check for changes (currently runs with main.sh cycle)
reboot_delay_seconds: 30                # Grace period before reboot
max_reboot_attempts_per_day: 3          # Daily limit on reboot attempts
maintenance_mode: false                  # Manual override to disable all reboots
emergency_override: false               # Emergency override for forced reboots

# Enhanced safe reboot mechanism configuration
safe_reboot:
  # Safety thresholds
  max_disk_usage_percent: 85            # Maximum disk usage before reboot is blocked
  max_memory_usage_percent: 85          # Maximum memory usage before reboot is blocked
  max_system_load_multiplier: 2         # Maximum load as multiplier of CPU count
  max_failed_services: 5                # Maximum failed services before reboot is blocked
  max_degraded_critical_services: 2     # Maximum degraded critical services before reboot is blocked
  
  # Reboot type determination
  maintenance_window_start: "02:00"    # Start time for maintenance window (24-hour format)
  maintenance_window_end: "04:00"      # End time for maintenance window (24-hour format)
  business_hours_start: "09:00"         # Start of business hours (may delay reboots)
  business_hours_end: "17:00"           # End of business hours (may delay reboots)
  
  # Graceful shutdown configuration
  graceful_shutdown_enabled: true        # Enable graceful service shutdown before reboot
  graceful_shutdown_timeout: 30         # Timeout for graceful shutdown (seconds)
  stop_non_critical_services: true      # Stop non-critical services before reboot
  sync_filesystems: true                 # Sync filesystems before reboot
  
  # Enhanced logging and monitoring
  create_pre_reboot_backup: true         # Create system state backup before reboot
  enhanced_state_logging: true           # Enable detailed system state logging
  monitor_during_countdown: true         # Perform safety checks during countdown
  countdown_check_interval: 30          # Seconds between safety checks during countdown
  
  # Notification and alerting
  user_notifications_enabled: false      # Enable desktop/wall notifications
  monitoring_integration_enabled: false  # Enable integration with monitoring systems
  critical_endpoints: ""                 # Comma-separated list of critical endpoints to check
  
  # Recovery and rollback
  create_failure_records: true           # Create detailed records on failures
  emergency_recovery_enabled: true       # Enable emergency recovery procedures
  backup_retention_days: 30              # Days to keep reboot attempt records

# Enhanced git change detection configuration
git_timeout_seconds: 30                  # Timeout for individual git operations
git_retry_attempts: 3                    # Number of retry attempts for failed git operations
git_retry_delay_seconds: 5               # Delay between retry attempts (exponential backoff)
network_timeout_seconds: 60              # Network operation timeout

# Change significance filtering
reboot_trigger_patterns: "scripts/*.sh|config.yaml|main.sh|scripts/utils.sh|scripts/core/*.sh"  # File patterns that trigger reboot
ignore_change_patterns: "*.md|*.txt|*.log|tests/*.sh|.*"  # File patterns to ignore
min_changed_files_for_reboot: 1          # Minimum number of significant changes to trigger reboot
max_change_count_for_reboot: 100         # Maximum number of changes before manual review is required

# Beads updater configuration (CRITICAL P0 - Automated Repository Synchronization)
beads_updater:
  default_sync_mode: "incremental"      # "incremental" or "full" - sync mode preference
  default_conflict_strategy: "newest"   # "newest", "manual", "keep_local", "keep_remote"
  default_max_retries: 3               # Maximum retry attempts for failed syncs
  backup_retention_days: 30            # Days to keep automatic backups
  enable_detailed_reporting: true       # Generate detailed JSON sync reports
  cleanup_temp_files: true             # Clean up temporary files after sync
  lock_timeout_minutes: 30            # Lock file timeout to prevent deadlocks

# Enhanced branch protection configuration
branch_protection:
  enable_protection: true              # Enable branch protection mechanisms
  require_confirmation: true           # Require explicit confirmation for protected branches
  show_warnings: true                  # Show warnings before deleting any branch
  protected_branches:                  # List of branches that are always protected
    - "main"
    - "master"
    - "develop"
    - "staging"
    - "production"
  protect_current_branch: true        # Always protect the currently checked-out branch
  protection_patterns:                 # Branch name patterns that are protected
    - "keep-*"
    - "protected-*"
    - "temp-*"
    - "backup-*"
  require_explicit_confirmation_for:   # Branch types requiring explicit confirmation
    - "main"
    - "master"
    - "develop"
    - "staging"
    - "production"

# Enhanced branch cleanup configuration (Auto-683)
branch_cleanup:
  # Dry-run and interactive mode settings
  dry_run_mode: false                  # Enable dry-run mode by default
  interactive_mode: true               # Enable interactive prompts
  confirm_before_delete: true          # Confirm before each branch deletion
  show_dry_run_summary: true           # Show detailed summary in dry-run mode
  batch_confirmation: false            # Confirm all operations at once vs individual
  confirmation_timeout: 60            # Timeout for confirmation prompts (seconds)
  
  # Safety and operational settings
  safety_mode: true                    # Enable all safety checks by default
  backup_before_delete: true           # Create backup patches before deletion
  max_branches_per_run: 50            # Maximum branches to delete in one run
  
  # Dry-run specific settings
  show_branch_details: true            # Show detailed branch info in dry-run
  show_safety_info: true               # Show safety configuration in dry-run
  show_skipped_branches: true          # Show why branches are skipped in dry-run

# Telegram Bot logging configuration (P0 Critical)
telegram:
  enabled: false                        # Enable/disable Telegram logging globally
  bot_token: "${TELEGRAM_BOT_TOKEN}"    # Environment variable for bot token (NEVER store in plain text)
  default_chat_id: "@logs_channel"      # Default channel/chat for sending messages
  api_timeout_seconds: 10               # Timeout for Telegram API requests
  connection_retries: 3                 # Maximum retry attempts for failed connections
  
  # Rate limiting configuration
  rate_limiting:
    messages_per_second: 5              # Conservative rate limit (far below Telegram's 30/sec)
    burst_size: 20                     # Burst capacity for handling logs
    rate_limit_window_seconds: 60      # Time window for rate limiting calculations
    backoff_multiplier: 2              # Multiplier for exponential backoff
    max_backoff_seconds: 30             # Maximum backoff delay
  
  # Message formatting configuration
  formatting:
    parse_mode: "HTML"                  # Message format: "HTML", "Markdown", or "plain"
    max_message_length: 4000            # Safe message length (below Telegram's 4096 limit)
    include_timestamp: true             # Include timestamps in messages
    include_log_level: true             # Include log level indicators
    include_script_name: true           # Include script name for context
    use_emoji_indicators: true          # Use emoji for log levels (🔴🟡🟢🔵)
  
  # Retry and error handling configuration
  retry:
    max_attempts: 3                     # Maximum retry attempts for failed messages
    base_delay: 1.0                     # Base delay in seconds for exponential backoff
    max_delay: 30.0                     # Maximum delay in seconds
    jitter: true                        # Add randomness to prevent thundering herd
  
  # Message filtering configuration
  filters:
    log_levels: ["ERROR", "WARNING", "SUCCESS"]  # Log levels to forward to Telegram
    scripts: ["main.sh", "updater.sh", "implementer.sh", "planner.sh"]  # Scripts to monitor
    exclude_patterns: []                # Regex patterns to exclude from Telegram
    include_patterns: []                # Regex patterns to include (if specified, acts as whitelist)
  
  # Security configuration
  security:
    validate_bot_token: true            # Validate bot token format and connectivity
    encrypt_config_storage: true         # Encrypt sensitive configuration in memory
    audit_token_access: true            # Log all token access attempts
    hide_tokens_in_logs: true           # Redact tokens in log outputs
    require_https: true                 # Enforce HTTPS for all API calls
  
  # Health monitoring configuration
  health:
    enable_health_checks: true          # Periodic health checks for Telegram integration
    health_check_interval_minutes: 15   # How often to run health checks
    api_connectivity_test: true         # Test API connectivity during health checks
    rate_limit_monitoring: true          # Monitor rate limiting status
    queue_size_monitoring: true         # Monitor message queue size
  
  # Configuration management
  config:
    auto_reload: true                   # Reload configuration without restart
    config_file_watch_interval_seconds: 30  # How often to check for config changes
    validation_strictness: "strict"     # Validation level: "strict", "warn", or "relaxed"
    backup_configuration: true          # Backup configuration changes

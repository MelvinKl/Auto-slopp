repos:
  - repo: local
    hooks:
      - id: make-format
        name: Run make format
        entry: make format
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements



  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=120, --extend-ignore=E203,W503,F401,D104,I201,I100,F841,F811]
        additional_dependencies:
          - flake8-docstrings
          - flake8-import-order
          - flake8-bugbear

name: Lint

on:
  push:
    branches: [ main, rework/python ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: |
        python --version
        make --version || true
        pip install --upgrade pip
        pip install -e .[dev]

    - name: Verify tools and run linting
      run: |
        echo "=== Verifying tools ==="
        which black isort flake8 bandit safety || true
        echo "=== Running linting ==="
        make lint
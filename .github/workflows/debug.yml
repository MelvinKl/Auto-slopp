name: Debug CI

on:
  push:
    branches: [ main, rework/python ]
  pull_request:
    branches: [ main ]

jobs:
  debug:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Debug environment
      run: |
        echo "Python version:"
        python --version
        echo "UV version:"
        uv --version
        echo "Make version:"
        make --version || echo "make not available"
        echo "Available tools:"
        which black isort flake8 || true
        echo "Current directory:"
        pwd
        echo "Listing Makefile:"
        ls -la Makefile
        echo "Makefile content preview:"
        head -20 Makefile

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install dependencies
      run: make dev-install

    - name: Test Makefile help
      run: make help

    - name: Try linting
      run: |
        echo "=== Attempting linting ==="
        make lint
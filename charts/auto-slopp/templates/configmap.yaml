apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "auto-slopp.fullname" . }}
  labels:
    {{- include "auto-slopp.labels" . | nindent 4 }}
data:
{{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- if .Values.configMaps }}
{{- range $key, $value := .Values.configMaps }}
  {{ $key }}: |
{{ $value | indent 4 }}
{{- end }}
{{- end }}
